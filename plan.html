<style>
:root{
  --paper:#f5f3ec;--card:#fffdf7;--ink:#221f1b;--indigo:#28406a;--indigo-deep:#1c2f50;
  --shu:#c9381f;--shu-soft:#fbeae6;--muted:#8b8376;--line:#e3ddcf;--ok:#2c6e49;--gold:#8a6d1f;--teal:#1f6d6d;
  --serif:"Hiragino Mincho ProN","Yu Mincho","BIZ UDPMincho","Noto Serif JP",serif;
  --sans:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","BIZ UDPGothic","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;color-scheme:light only;background:#f5f3ec}
@media (prefers-color-scheme:dark){html{background:#f5f3ec}body{background:var(--paper);color:var(--ink)}}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.65;min-height:100dvh;padding-bottom:calc(env(safe-area-inset-bottom) + 74px)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button:focus-visible,input:focus-visible{outline:3px solid var(--indigo);outline-offset:2px}
input{font-family:inherit}

.masthead{background:linear-gradient(160deg,var(--indigo),var(--indigo-deep));color:#f7f4ea;padding:calc(env(safe-area-inset-top) + 20px) 18px 16px}
.masthead .ed{font-size:11px;letter-spacing:.22em;opacity:.75;margin-bottom:4px}
.masthead h1{font-family:var(--serif);font-weight:600;font-size:22px;letter-spacing:.12em}
.masthead .total{margin-top:10px;display:flex;gap:18px;font-size:12px;border-top:1px solid rgba(255,255,255,.22);padding-top:8px;flex-wrap:wrap}
.masthead .total b{font-size:17px;font-weight:600;margin-right:3px;font-variant-numeric:tabular-nums}
.wrap{max-width:680px;margin:0 auto;padding:16px 16px 30px}
.screen{display:none}.screen.active{display:block}

.sec-label{font-family:var(--serif);font-size:13px;letter-spacing:.25em;color:var(--indigo);margin:20px 2px 10px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
.sec-label:first-child{margin-top:2px}
.sec-label .mins{letter-spacing:.05em;font-family:var(--sans);font-size:11px;color:var(--muted)}

.task{display:flex;gap:12px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;box-shadow:0 1px 3px rgba(40,40,30,.05);align-items:flex-start}
.task.done{opacity:.55}
.task.done .tl{text-decoration:line-through;text-decoration-color:var(--shu);text-decoration-thickness:1.5px}
.cbx-btn{flex:none;padding:6px;margin:-6px 2px -6px -6px;border-radius:8px}
.cbx-btn:active .cbx{transform:scale(.9)}
.cbx{width:23px;height:23px;border:1.8px solid var(--indigo);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;background:#fff;font-size:15px;color:#fff;transition:background .12s,transform .08s;pointer-events:none}
.task.done .cbx{background:var(--indigo)}
.task .bd{flex:1;min-width:0;padding-top:2px}
.task .tl{font-size:14.5px;font-weight:600;line-height:1.45}
.task .ds{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.55}
.task .meta{display:flex;gap:6px;margin-top:7px;align-items:center;flex-wrap:wrap}
.chip{font-size:10.5px;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted);letter-spacing:.05em}
.chip.subj{color:#fff;border:none}
.chip.auto{border-color:var(--ok);color:var(--ok)}
.chip.est{font-variant-numeric:tabular-nums}
.chip.over{border-color:var(--shu);color:var(--shu)}

.note{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:12px}
.note b{color:var(--ink)}
.note.alert{border-color:var(--shu);background:var(--shu-soft);color:var(--ink)}
.note.mock{border-left:4px solid var(--shu)}

.stat-row{display:flex;gap:10px;margin-bottom:12px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.stat .v{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--indigo);font-variant-numeric:tabular-nums;line-height:1.3}
.stat .v.red{color:var(--shu)}
.stat .k{font-size:10.5px;color:var(--muted);letter-spacing:.1em;margin-top:2px}

.pcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:10px}
.pcard .hd{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.pcard .nm{font-weight:600;font-size:14.5px;flex:1}
.pcard .pct{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.bar{height:6px;border-radius:3px;background:#ece7da;overflow:hidden;display:flex;margin-bottom:6px}
.bar i{display:block;height:100%;background:var(--indigo)}
.bar i.p2{background:var(--ok)}.bar i.p3{background:var(--gold)}.bar i.p4{background:var(--shu)}
.pcard .lg{font-size:10.5px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.pcard .lg i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:baseline}
.pill{display:inline-block;font-size:11px;padding:2px 10px;border-radius:999px;font-weight:600;letter-spacing:.05em}
.pill.ok{background:#e4efe7;color:var(--ok)}
.pill.warn{background:#f7ecd8;color:var(--gold)}
.pill.bad{background:var(--shu-soft);color:var(--shu)}

.mock-li{display:flex;align-items:center;gap:12px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:13.5px}
.mock-li:last-child{border-bottom:none}
.mock-li .no{font-family:var(--serif);color:var(--indigo);font-weight:600;width:52px}
.mock-li .dt{font-variant-numeric:tabular-nums;flex:1}
.mock-li .st{font-size:11px;color:var(--muted)}
.mock-li.past{opacity:.5}

.set-group{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px 15px;margin-bottom:14px}
.set-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.set-row:last-child{border-bottom:none}
.set-row label{flex:1;font-size:13.5px}
.set-row label small{display:block;color:var(--muted);font-size:11px}
.set-row input{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:14px;background:#fff;width:150px;font-variant-numeric:tabular-nums}
.set-row input[type=number]{width:80px}
.danger{color:var(--shu);font-weight:600;font-size:13.5px;padding:12px 0;width:100%;text-align:center}

.tabbar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);display:flex;padding:6px 8px calc(env(safe-area-inset-bottom) + 6px)}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;font-size:10.5px;color:var(--muted);letter-spacing:.1em;border-radius:10px}
.tabbar button.on{color:var(--indigo);font-weight:700}
.tabbar svg{width:22px;height:22px}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px;line-height:2}

.toast{position:fixed;left:16px;right:16px;bottom:calc(env(safe-area-inset-bottom) + 82px);background:var(--indigo-deep);color:#f7f4ea;border-radius:12px;padding:12px 8px 12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 6px 20px rgba(0,0,0,.22);z-index:50;opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .18s,transform .18s}
.toast.show{opacity:1;transform:translateY(0);pointer-events:auto}
.toast .tx{flex:1;font-size:13px}
.toast .undo{flex:none;color:#fff;font-weight:700;font-size:13px;letter-spacing:.05em;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.14)}
.toast .undo:active{background:rgba(255,255,255,.24)}
.today-date{font-family:var(--serif);font-size:15px;color:var(--indigo);letter-spacing:.1em;margin-bottom:12px}
.foot-note{font-size:11.5px;color:var(--muted);margin-top:16px;line-height:1.8;text-align:center}
</style>
</head>

/* ---------- 定数 ---------- */
const SUBJ_COLOR = {"企業法":"#c9381f","管理理論":"#8a6d1f","監査":"#2c6e49","財理":"#28406a","財計":"#1c2f50","管理計算":"#1f6d6d"};

/* ---------- 状態 ---------- */
let manual = {}, snaps = {}, settings = {};
try{ manual = JSON.parse(localStorage.getItem(PKEY_PLAN)||"{}") }catch(e){}
try{ snaps = JSON.parse(localStorage.getItem(PKEY_SNAP)||"{}") }catch(e){}

/* ---------- ○×アプリ連動 ---------- */
let quiz = null;
try{ quiz = JSON.parse(localStorage.getItem(QUIZ_KEY)||"null") }catch(e){}
function attempts(qid){ const p = quiz && quiz[qid]; return p ? (p.o||0)+(p.x||0) : 0 }
function linkFrac(link){          // link範囲のうち「p回以上解いた」問題の割合
  let hit=0, n=link.hi-link.lo;
  for(let k=link.lo;k<link.hi;k++) if(attempts(k)>=link.p) hit++;
  return n? hit/n : 0;
}
function isDone(t){
  if(manual[t.id]===1) return true;
  if(manual[t.id]===0) return false;
  return !!(t.link && quiz && linkFrac(t.link)>=0.9);
}
function isAuto(t){ return manual[t.id]===undefined && t.link && quiz && linkFrac(t.link)>=0.9 }

/* ---------- 日付 ---------- */
const fmtD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parseD = s => { const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd) };
const WD = ["日","月","火","水","木","金","土"];
const today = new Date(); today.setHours(0,0,0,0);
const tStr = fmtD(today);
function daysUntil(s){ return Math.round((parseD(s)-today)/864e5) }

/* ---------- 日次スナップショット（アプリで今日解いた数の集計用） ---------- */
function subjTotals(){
  const out = {};
  if(!quiz) return out;
  PLAN_SUBJ_RANGES.forEach(([name,lo,hi])=>{
    let s=0; for(let k=lo;k<hi;k++) s+=attempts(k);
    out[name]=s;
  });
  return out;
}
const PLAN_SUBJ_RANGES = (()=>{  // 理論4科目のグローバル問題範囲をタスクから復元
  const r={};
  Object.values(PLAN.tasks).forEach(t=>{
    if(!t.link) return;
    const cur=r[t.s]||[Infinity,-Infinity];
    r[t.s]=[Math.min(cur[0],t.link.lo),Math.max(cur[1],t.link.hi)];
  });
  return Object.entries(r).map(([n,[lo,hi]])=>[n,lo,hi]);
})();
(function takeSnap(){
  if(!quiz) return;
  const cur=subjTotals();
  if(!snaps[tStr]) { snaps[tStr]=cur; }
  // 最新の実数は描画時に直接計算するので、スナップは「その日の開始値」を保持
  const keys=Object.keys(snaps).sort();
  while(keys.length>40){ delete snaps[keys.shift()] }
  localStorage.setItem(PKEY_SNAP, JSON.stringify(snaps));
})();
function answeredToday(){
  if(!quiz) return null;
  const base=snaps[tStr]; if(!base) return null;
  const cur=subjTotals(), out={};
  let any=false;
  for(const k in cur){ const d=cur[k]-(base[k]||0); if(d>0){out[k]=d;any=true} }
  return any? out : null;
}

/* ---------- スケジュール・シミュレーション ---------- */
function remaining(track){ return PLAN.order[track].map(id=>PLAN.tasks[id]).filter(t=>!isDone(t)) }
function isMock(dstr){ return cfg().mocks.includes(dstr) }
function mockReviewDay(dstr){  // 前日〜2日前に答練があれば復習日
  const d=parseD(dstr);
  for(let back=1;back<=2;back++){
    const p=fmtD(new Date(d.getFullYear(),d.getMonth(),d.getDate()-back));
    if(cfg().mocks.includes(p)) return p;
  }
  return null;
}
function budgetFor(dstr, track){
  const d=parseD(dstr);
  if(d.getDay()===0) return 0;                       // 日曜=予備日
  let b=cfg().budgets[track];
  if(track==="riron" && mockReviewDay(dstr)) b=Math.max(0,b-120);  // 答練復習2h
  return b;
}
function simulate(){
  // 各トラックの残タスクを今日から分単位で流し込む。
  // 長いタスクは複数日に跨り、startD〜finDの期間を持つ。
  const startD={}, finD={}, finish={};
  TRACK_ORDER.forEach(tr=>{
    const rem=remaining(tr);
    if(!rem.length){ finish[tr]=tStr; return }
    let d=new Date(today), guard=0;
    let avail=budgetFor(fmtD(d),tr);
    const advance=()=>{ do{ d.setDate(d.getDate()+1); avail=budgetFor(fmtD(d),tr) }while(avail<=0 && guard++<1200) };
    if(avail<=0) advance();
    let broke=false;
    for(const t of rem){
      if(guard>=1200){ broke=true; break }
      let need=t.m;
      startD[t.id]=fmtD(d);
      while(need>avail){ need-=avail; advance(); if(guard>=1200){broke=true;break} }
      if(broke) break;
      avail-=need;
      finD[t.id]=fmtD(d);
      if(avail<=0) advance();
    }
    finish[tr]= broke? null : (finD[rem[rem.length-1].id] || null);
  });
  return {startD, finD, finish};
}

/* ---------- 描画: ヘッダ ---------- */
function renderHead(){
  const c=cfg(), dd=daysUntil(c.exam);
  const total=Object.values(PLAN.tasks).length;
  const done=Object.values(PLAN.tasks).filter(isDone).length;
  document.getElementById("head-stats").innerHTML=
    `<span><b>${dd}</b>日 <small>試験まで</small></span>`+
    `<span><b>${done}</b>/${total} <small>タスク消化</small></span>`+
    `<span><b>${Math.round(done/total*100)}</b>% <small>全体進捗</small></span>`;
}

/* ---------- 描画: 今日 ---------- */
function taskCard(t, opts={}){
  const done=isDone(t), auto=isAuto(t);
  const chips=[`<span class="chip subj" style="background:${SUBJ_COLOR[t.s]}">${t.s}</span>`,
               `<span class="chip est">約${t.m}分</span>`];
  if(auto) chips.push(`<span class="chip auto">アプリ連動で完了</span>`);
  if(opts.overdue) chips.push(`<span class="chip over">繰越</span>`);
  return `<div class="task ${done?"done":""}" data-id="${t.id}">
    <button class="cbx-btn" data-id="${t.id}" aria-label="${done?"完了を解除":"完了にする"}"><span class="cbx">${done?"✓":""}</span></button>
    <span class="bd">
      <span class="tl">${t.l}</span>
      <span class="ds">${t.d}</span>
      <span class="meta">${chips.join("")}</span>
    </span></div>`;
}
function renderToday(){
  const el=document.getElementById("scr-today");
  const c=cfg();
  const d=new Date(today);
  let html=`<div class="today-date">${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）</div>`;

  // アプリで今日解いた数
  const at=answeredToday();
  if(at){
    const parts=Object.entries(at).map(([k,v])=>`${k} <b>${v}問</b>`).join("・");
    html+=`<div class="note">今日アプリで解いた問題：${parts}</div>`;
  }
  if(!quiz){
    html+=`<div class="note">○×アプリの解答履歴が見つかりません。<b>このページを○×アプリと同じブラウザ（Safari等）で開く</b>と、アプリの進捗が自動でタスクに反映されます。</div>`;
  }
  // 答練
  if(isMock(tStr)){
    const no=c.mocks.indexOf(tStr)+1;
    html+=`<div class="note mock"><b>短答直前答練 第${no}回</b>　今日は答練優先。終了後は自己採点まで。詳しい復習は明日。</div>`;
  }
  const mr=mockReviewDay(tStr);
  if(mr && parseD(tStr).getDay()!==0){
    html+=`<div class="note mock"><b>答練復習（約2時間）</b>　昨日の答練の×を科目別に潰す。理論の×はアプリの該当章へ、計算の×はテキストの該当節へ。今日の理論ノルマは2時間分軽くしてあります。</div>`;
  }

  const {startD,finD}=simulate();
  const isSun=parseD(tStr).getDay()===0;
  if(isSun){
    html+=`<div class="note"><b>今日は予備日。</b>今週消化しきれなかったタスクが下に出ています。空なら休むか、先取りでどうぞ。</div>`;
    // 今週(月〜土)に予定されていて未消化のものは、シミュレーション上「未来」に流れている
    // → 各トラックの先頭数件を「取り戻し候補」として表示
    TRACK_ORDER.forEach(tr=>{
      const rem=remaining(tr).slice(0,3);
      if(!rem.length) return;
      html+=`<div class="sec-label">${TRACK_NAME[tr]}<span class="mins">取り戻し候補</span></div>`;
      rem.forEach(t=>{ html+=taskCard(t) });
    });
    if(TRACK_ORDER.every(tr=>!remaining(tr).length)) html+=`<div class="empty">全タスク完了。おつかれさま。</div>`;
  }else{
    TRACK_ORDER.forEach(tr=>{
      const todays=PLAN.order[tr].map(id=>PLAN.tasks[id])
        .filter(t=>startD[t.id]&&startD[t.id]<=tStr&&tStr<=finD[t.id]);
      const doneToday=PLAN.order[tr].map(id=>PLAN.tasks[id]).filter(t=>isDone(t)&&manualDate(t)===tStr);
      const bud=budgetFor(tStr,tr);
      html+=`<div class="sec-label">${TRACK_NAME[tr]}<span class="mins">目安 ${bud}分</span></div>`;
      const list=[...doneToday, ...todays.filter(t=>!doneToday.includes(t))];
      if(!list.length){ html+=`<div class="empty">このトラックは完了、または今日の分なし</div>`; }
      list.forEach(t=>{ html+=taskCard(t) });
    });
  }
  html+=`<p class="foot-note">丸いチェックをタップで完了／解除。理論タスクは○×アプリの解答履歴から自動判定（範囲の9割を解くと完了）。<br>終わらなかった分は自動で翌日以降に繰り越されます。</p>`;
  el.innerHTML=html;
  el.querySelectorAll(".cbx-btn").forEach(b=>{
    b.onclick=(ev)=>{
      ev.stopPropagation();
      toggleTask(b.dataset.id);
    };
  });
}

/* ---------- 完了トグル + Undoトースト ---------- */
let toastT=null;
function toggleTask(id, opts={}){
  const t=PLAN.tasks[id];
  const cur=isDone(t);
  const nowDone=!cur;
  manual[id]=nowDone?1:0;
  manualDates[id]=nowDone?tStr:undefined;
  saveManual(); localStorage.setItem("cpa-plan-dates",JSON.stringify(manualDates));
  renderAll();
  if(!opts.silent) showUndoToast(t, nowDone);
}
function showUndoToast(t, nowDone){
  clearTimeout(toastT);
  const el=document.getElementById("toast");
  document.getElementById("toast-tx").textContent=(nowDone?"完了にしました：":"未完了に戻しました：")+t.l;
  el.classList.add("show");
  document.getElementById("toast-undo").onclick=()=>{
    clearTimeout(toastT);
    el.classList.remove("show");
    toggleTask(t.id,{silent:true});
  };
  toastT=setTimeout(()=>el.classList.remove("show"), 4500);
}
let manualDates={};
try{ manualDates=JSON.parse(localStorage.getItem("cpa-plan-dates")||"{}") }catch(e){}
function manualDate(t){ return manualDates[t.id] }

/* ---------- 描画: 進捗 ---------- */
function renderProg(){
  const el=document.getElementById("scr-prog");
  const c=cfg(), {finish}=simulate();
  const dd=daysUntil(c.exam);
  let html=`<div class="stat-row">
    <div class="stat"><div class="v ${dd<30?"red":""}">${dd}</div><div class="k">試験まで（日）</div></div>
    <div class="stat"><div class="v">${Math.round(Object.values(PLAN.tasks).filter(isDone).length/Object.keys(PLAN.tasks).length*100)}%</div><div class="k">全体進捗</div></div>
  </div>`;

  html+=`<div class="sec-label">完了見込み</div>`;
  TRACK_ORDER.forEach(tr=>{
    const f=finish[tr];
    let pill;
    if(!f) pill=`<span class="pill bad">試験までに終わらない見込み</span>`;
    else{
      const slack=daysUntil(c.exam)-daysUntil(f);
      pill = slack>14? `<span class="pill ok">${f.slice(5).replace("-","/")} 完了見込み・余裕${slack}日</span>`
           : slack>=0? `<span class="pill warn">${f.slice(5).replace("-","/")} 完了見込み・余裕${slack}日</span>`
           : `<span class="pill bad">${f.slice(5).replace("-","/")} 完了見込み・${-slack}日超過</span>`;
    }
    const rem=remaining(tr), all=PLAN.order[tr].length;
    html+=`<div class="pcard"><div class="hd"><span class="nm">${TRACK_NAME[tr]}</span><span class="pct">${all-rem.length}/${all}</span></div>
      <div class="bar"><i style="width:${(all-rem.length)/all*100}%"></i></div>${pill}</div>`;
  });

  // 理論科目: アプリ周回の実測
  html+=`<div class="sec-label">アプリ周回（実測）</div>`;
  if(quiz){
    PLAN_SUBJ_RANGES.forEach(([name,lo,hi])=>{
      const n=hi-lo;
      let p1=0,p2=0,p3=0,p4=0;
      for(let k=lo;k<hi;k++){ const a=attempts(k); if(a>=1)p1++; if(a>=2)p2++; if(a>=3)p3++; if(a>=4)p4++ }
      html+=`<div class="pcard"><div class="hd"><span class="nm" style="color:${SUBJ_COLOR[name]}">${name}</span><span class="pct">${n}問</span></div>
        <div class="bar"><i style="width:${p1/n*100}%"></i></div>
        <div class="bar"><i class="p2" style="width:${p2/n*100}%"></i></div>
        <div class="bar"><i class="p3" style="width:${p3/n*100}%"></i></div>
        <div class="bar"><i class="p4" style="width:${p4/n*100}%"></i></div>
        <div class="lg"><span><i style="background:var(--indigo)"></i>1周 ${Math.round(p1/n*100)}%</span><span><i style="background:var(--ok)"></i>2周 ${Math.round(p2/n*100)}%</span><span><i style="background:var(--gold)"></i>3周 ${Math.round(p3/n*100)}%</span><span><i style="background:var(--shu)"></i>4周 ${Math.round(p4/n*100)}%</span></div></div>`;
    });
  }else{
    html+=`<div class="note">○×アプリの履歴が読めないため表示できません。アプリと同じブラウザで開いてください。</div>`;
  }

  // 答練
  html+=`<div class="sec-label">短答直前答練</div><div class="pcard">`;
  c.mocks.forEach((m,i)=>{
    const past=daysUntil(m)<0;
    html+=`<div class="mock-li ${past?"past":""}"><span class="no">第${i+1}回</span><span class="dt">${m.replace(/-/g,"/")}</span><span class="st">${past?"実施済":daysUntil(m)+"日後"}</span></div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

/* ---------- 描画: 設定 ---------- */
function renderSet(){
  const el=document.getElementById("scr-set");
  const c=cfg();
  let html=`<div class="sec-label">試験・答練日程</div><div class="set-group">
    <div class="set-row"><label>短答式 試験日<small>暫定。正式日程が出たら修正</small></label><input type="date" id="set-exam" value="${c.exam}"></div>`;
  c.mocks.forEach((m,i)=>{
    html+=`<div class="set-row"><label>答練 第${i+1}回</label><input type="date" data-mock="${i}" value="${m}"></div>`;
  });
  html+=`</div><div class="sec-label">1日の学習時間（月〜土・分）</div><div class="set-group">
    <div class="set-row"><label>財務会計（計算）</label><input type="number" id="set-b-zaikei" value="${c.budgets.zaikei}" step="15"></div>
    <div class="set-row"><label>管理会計（計算）</label><input type="number" id="set-b-kanri" value="${c.budgets.kanri}" step="15"></div>
    <div class="set-row"><label>理論（4科目）</label><input type="number" id="set-b-riron" value="${c.budgets.riron}" step="15"></div>
  </div>
  <div class="note">日曜は予備日（ノルマ0）。時間を増やしたら、完了見込みが自動で前倒しされます。<br>
  理論タスクは○×アプリの履歴（同じブラウザのlocalStorage）と連動します。<b>ホーム画面に追加したアプリとSafariは履歴が別々</b>になるので、どちらか一方に揃えて使ってください。</div>
  <div class="set-group"><button class="danger" id="set-reset">計画のチェック状態をリセット</button></div>`;
  el.innerHTML=html;
  el.querySelector("#set-exam").onchange=e=>{ settings.exam=e.target.value; saveSettings(); renderAll() };
  el.querySelectorAll("[data-mock]").forEach(inp=>{
    inp.onchange=e=>{
      const m=[...(settings.mocks||c.mocks)];
      m[Number(e.target.dataset.mock)]=e.target.value;
      settings.mocks=m; saveSettings(); renderAll();
    };
  });
  ["zaikei","kanri","riron"].forEach(k=>{
    el.querySelector(`#set-b-${k}`).onchange=e=>{
      settings.budgets=Object.assign({},settings.budgets,{[k]:Number(e.target.value)||PLAN.budgets[k]});
      saveSettings(); renderAll();
    };
  });
  el.querySelector("#set-reset").onclick=()=>{
    if(confirm("手動チェックを全て消します。○×アプリの解答履歴は消えません。よいですか？")){
      manual={}; manualDates={}; saveManual();
      localStorage.setItem("cpa-plan-dates","{}");
      renderAll();
    }
  };
}

/* ---------- タブ ---------- */
document.querySelectorAll(".tabbar button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".tabbar button").forEach(x=>x.classList.toggle("on",x===b));
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById("scr-"+b.dataset.tab).classList.add("active");
    window.scrollTo(0,0);
  };
});

function renderAll(){ renderHead(); renderToday(); renderProg(); renderSet() }
renderAll();
</script>
